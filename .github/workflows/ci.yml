name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, "phase-*"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.4.0"
      - name: Run ruff
        run: ruff check .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install "mypy>=1.10.0" "pydantic>=2.7.0" "pydantic-settings>=2.2.1"
      - name: Run mypy
        run: mypy shared/ --ignore-missing-imports

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install shared and test dependencies
        run: |
          pip install \
            "pytest>=8.0.0" \
            "pytest-asyncio>=0.23.0" \
            "respx>=0.20.0" \
            "pydantic>=2.7.0" \
            "pydantic-settings>=2.2.1" \
            "fastapi>=0.111.0" \
            "httpx>=0.27.0" \
            "python-multipart>=0.0.9" \
            "sqlalchemy[asyncio]>=2.0.0" \
            "asyncpg>=0.29.0" \
            "boto3>=1.34.0" \
            "tiktoken>=0.7.0" \
            "pyyaml>=6.0.1" \
            "weaviate-client>=4.6.0" \
            "presidio-analyzer>=2.2.0" \
            "presidio-anonymizer>=2.2.0" \
            "pdfplumber>=0.11.0" \
            "python-docx>=1.1.0" \
            "openai>=1.30.0" \
            "anthropic>=0.28.0" \
            "sse-starlette>=2.1.0"
      - name: Run shared tests
        run: pytest tests/ -v --tb=short -m "not integration"
      - name: Run uploader-service unit tests
        env:
          PYTHONPATH: services/uploader-service
        run: |
          pytest services/uploader-service/tests/test_ingest.py \
            -v --tb=short -m "not integration"
      - name: Run doc-processing unit tests
        env:
          PYTHONPATH: services/doc-processing
        run: |
          pytest \
            services/doc-processing/tests/test_scrubber.py \
            services/doc-processing/tests/test_pdf_parser.py \
            services/doc-processing/tests/test_docx_parser.py \
            services/doc-processing/tests/test_txt_parser.py \
            services/doc-processing/tests/test_chunker.py \
            -v --tb=short -m "not integration"
      - name: Run chat-service unit tests
        env:
          PYTHONPATH: services/chat-service
        run: |
          pytest \
            services/chat-service/tests/test_expander.py \
            services/chat-service/tests/test_searcher.py \
            services/chat-service/tests/test_reranker.py \
            services/chat-service/tests/test_audit_log.py \
            -v --tb=short -m "not integration"
      - name: Run embedding-service unit tests
        env:
          PYTHONPATH: services/embedding-service
        run: |
          pytest \
            services/embedding-service/tests/test_batcher.py \
            services/embedding-service/tests/test_embedding_client.py \
            services/embedding-service/tests/test_publisher.py \
            -v --tb=short -m "not integration"
      - name: Run indexing-service unit tests
        env:
          PYTHONPATH: services/indexing-service
        run: |
          pytest \
            services/indexing-service/tests/test_weaviate_writer.py \
            services/indexing-service/tests/test_coordinator.py \
            services/indexing-service/tests/test_dlq_monitor.py \
            -v --tb=short -m "not integration"
