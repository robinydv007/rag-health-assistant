name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, "phase-*"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.4.0"
      - name: Run ruff
        run: ruff check .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install "mypy>=1.10.0" "pydantic>=2.7.0" "pydantic-settings>=2.2.1"
      - name: Run mypy
        run: mypy shared/ --ignore-missing-imports

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install "pytest>=8.0.0" "pydantic>=2.7.0" "pydantic-settings>=2.2.1"
      - name: Run tests
        run: pytest tests/ -v
