include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = relaxed
}

queues {
  doc-processing-queue {
    defaultVisibilityTimeout = 300 seconds
    receiveMessageWait = 20 seconds
    deadLettersQueue {
      name = doc-processing-dlq
      maxReceiveCount = 3
    }
  }
  doc-processing-dlq {}

  embedding-queue {
    defaultVisibilityTimeout = 600 seconds
    receiveMessageWait = 20 seconds
    deadLettersQueue {
      name = embedding-dlq
      maxReceiveCount = 3
    }
  }
  embedding-dlq {}

  indexing-queue {
    defaultVisibilityTimeout = 60 seconds
    receiveMessageWait = 20 seconds
    deadLettersQueue {
      name = indexing-dlq
      maxReceiveCount = 3
    }
  }
  indexing-dlq {}
}
