version: "3.9"

services:
  # ─── User-facing services ────────────────────────────────────────────────────
  chat-service:
    build:
      context: ../../services/chat-service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
    depends_on:
      - postgres
      - weaviate
      - elasticmq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  uploader-service:
    build:
      context: ../../services/uploader-service
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
    depends_on:
      - postgres
      - elasticmq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Pipeline services ───────────────────────────────────────────────────────
  doc-processing:
    build:
      context: ../../services/doc-processing
      dockerfile: Dockerfile
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
    depends_on:
      - postgres
      - elasticmq
    restart: unless-stopped

  embedding-service:
    build:
      context: ../../services/embedding-service
      dockerfile: Dockerfile
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
    depends_on:
      - elasticmq
    restart: unless-stopped

  indexing-service:
    build:
      context: ../../services/indexing-service
      dockerfile: Dockerfile
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
    depends_on:
      - postgres
      - weaviate
      - elasticmq
    restart: unless-stopped

  admin-service:
    build:
      context: ../../services/admin-service
      dockerfile: Dockerfile
    ports:
      - "8006:8000"
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
    depends_on:
      - postgres
      - weaviate
      - elasticmq
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: raghealth
      POSTGRES_USER: raghealth
      POSTGRES_PASSWORD: raghealth_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raghealth"]
      interval: 5s
      timeout: 3s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.25.0
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticmq:
    image: softwaremill/elasticmq-native:1.5.7
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ../../infrastructure/elasticmq.conf:/opt/elasticmq.conf

  adminer:
    image: adminer:4.8.1
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  weaviate_data:
