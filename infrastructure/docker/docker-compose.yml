services:
  # ─── User-facing services ────────────────────────────────────────────────────
  chat-service:
    build:
      context: ../../
      dockerfile: services/chat-service/Dockerfile
    ports:
      - "8001:8000"
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
      - DATABASE_URL=postgresql+asyncpg://raghealth:raghealth_local@postgres:5432/raghealth
      - WEAVIATE_URL=http://weaviate:8080
    depends_on:
      - postgres
      - weaviate
      - elasticmq
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  uploader-service:
    build:
      context: ../../
      dockerfile: services/uploader-service/Dockerfile
    ports:
      - "8002:8000"
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
      - S3_ENDPOINT_URL=http://minio:9000
      - DATABASE_URL=postgresql+asyncpg://raghealth:raghealth_local@postgres:5432/raghealth
      - SQS_QUEUE_1_URL=http://elasticmq:9324/000000000000/doc-processing-queue
    depends_on:
      - postgres
      - elasticmq
      - minio
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Pipeline services ───────────────────────────────────────────────────────
  doc-processing:
    build:
      context: ../../
      dockerfile: services/doc-processing/Dockerfile
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
      - S3_ENDPOINT_URL=http://minio:9000
      - DATABASE_URL=postgresql+asyncpg://raghealth:raghealth_local@postgres:5432/raghealth
      - SQS_QUEUE_1_URL=http://elasticmq:9324/000000000000/doc-processing-queue
      - SQS_QUEUE_2_URL=http://elasticmq:9324/000000000000/embedding-queue
    depends_on:
      - postgres
      - elasticmq
      - minio
    restart: unless-stopped

  embedding-service:
    build:
      context: ../../
      dockerfile: services/embedding-service/Dockerfile
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
      - DATABASE_URL=postgresql+asyncpg://raghealth:raghealth_local@postgres:5432/raghealth
      - SQS_QUEUE_2_URL=http://elasticmq:9324/000000000000/embedding-queue
      - SQS_QUEUE_3_URL=http://elasticmq:9324/000000000000/indexing-queue
      - SQS_DLQ_2_URL=http://elasticmq:9324/000000000000/embedding-dlq
      - SQS_DLQ_3_URL=http://elasticmq:9324/000000000000/indexing-dlq
    depends_on:
      - postgres
      - elasticmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  indexing-service:
    build:
      context: ../../
      dockerfile: services/indexing-service/Dockerfile
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
      - DATABASE_URL=postgresql+asyncpg://raghealth:raghealth_local@postgres:5432/raghealth
      - WEAVIATE_URL=http://weaviate:8080
      - SQS_QUEUE_3_URL=http://elasticmq:9324/000000000000/indexing-queue
      - SQS_DLQ_1_URL=http://elasticmq:9324/000000000000/doc-processing-dlq
      - SQS_DLQ_2_URL=http://elasticmq:9324/000000000000/embedding-dlq
      - SQS_DLQ_3_URL=http://elasticmq:9324/000000000000/indexing-dlq
    depends_on:
      - postgres
      - weaviate
      - elasticmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  admin-service:
    build:
      context: ../../
      dockerfile: services/admin-service/Dockerfile
    ports:
      - "8006:8000"
    env_file: ../../.env
    environment:
      - AWS_ENDPOINT_URL=http://elasticmq:9324
    depends_on:
      - postgres
      - weaviate
      - elasticmq
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: raghealth
      POSTGRES_USER: raghealth
      POSTGRES_PASSWORD: raghealth_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raghealth"]
      interval: 5s
      timeout: 3s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.28.2
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticmq:
    image: softwaremill/elasticmq-native:1.5.7
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ../../infrastructure/elasticmq.conf:/opt/elasticmq.conf

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
             mc mb --ignore-existing local/rag-health-local"
    restart: "no"

  adminer:
    image: adminer:4.8.1
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  db-migrate:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../../:/app
    command: >
      sh -c "pip install --quiet -r requirements-migrations.txt &&
             alembic upgrade head"
    environment:
      - DATABASE_URL=postgresql+psycopg2://raghealth:raghealth_local@postgres:5432/raghealth
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  weaviate-init:
    image: alpine:3.19
    volumes:
      - ../../scripts/init-weaviate.sh:/init-weaviate.sh
    command: >
      sh -c "apk add --no-cache bash curl dos2unix &&
             dos2unix -n /init-weaviate.sh /tmp/init-weaviate.sh &&
             WEAVIATE_URL=http://weaviate:8080 bash /tmp/init-weaviate.sh"
    depends_on:
      weaviate:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  weaviate_data:
  minio_data:
