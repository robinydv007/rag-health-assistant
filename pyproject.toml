[tool.pytest.ini_options]
testpaths = [
    "tests",
    "services/uploader-service/tests",
    "services/doc-processing/tests",
    "services/chat-service/tests",
]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["alembic/"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
