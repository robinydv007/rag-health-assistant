[tool.pytest.ini_options]
# Root testpaths covers only shared code; service tests are run per-service
# by CI (with PYTHONPATH=services/<svc>) to avoid `src` namespace collision.
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "strict"
markers = [
    "integration: requires live infrastructure (elasticmq, postgres, weaviate, minio)",
]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["alembic/"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disable_error_code = ["import-untyped"]
